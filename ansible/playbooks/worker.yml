---
# Playbook to deploy Kubernetes worker nodes
# Run with: ansible-playbook -i inventory/homelab.yml playbooks/worker.yml

- name: Deploy Kubernetes Worker Nodes
  hosts: k8s_workers
  gather_facts: true
  vars_files:
    - ../roles/worker/vars/main.yml
  roles:
    - role: ../roles/worker

- name: Deploy admin kubeconfig to jump server
  hosts: jump_servers
  gather_facts: true
  vars:
    k8s_cert_dir: "/etc/kubernetes/pki"
    haproxy_ip: "192.168.64.10"
    apiserver_port: 6443
  tasks:
    - name: Create .kube directory
      ansible.builtin.file:
        path: ~/.kube
        state: directory
        mode: '0755'

    - name: Fetch admin kubeconfig from master-1
      ansible.builtin.slurp:
        src: /etc/kubernetes/admin.kubeconfig
      register: admin_kubeconfig
      delegate_to: master-1
      become: true

    - name: Read CA cert from master-1
      ansible.builtin.slurp:
        src: "{{ k8s_cert_dir }}/ca.crt"
      register: ca_cert
      delegate_to: master-1
      become: true

    - name: Read admin cert from master-1
      ansible.builtin.slurp:
        src: "{{ k8s_cert_dir }}/admin.crt"
      register: admin_cert
      delegate_to: master-1
      become: true

    - name: Read admin key from master-1
      ansible.builtin.slurp:
        src: "{{ k8s_cert_dir }}/admin.key"
      register: admin_key
      delegate_to: master-1
      become: true

    - name: Create kubeconfig with embedded certs for jump server
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              certificate-authority-data: {{ ca_cert.content }}
              server: https://{{ haproxy_ip }}:{{ apiserver_port }}
            name: kubernetes
          contexts:
          - context:
              cluster: kubernetes
              user: admin
            name: default
          current-context: default
          users:
          - name: admin
            user:
              client-certificate-data: {{ admin_cert.content }}
              client-key-data: {{ admin_key.content }}
        dest: ~/.kube/config
        mode: '0600'

    - name: Copy kubectl to jump server
      ansible.builtin.copy:
        src: /tmp/k8s-binaries/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'
      become: true

- name: Validate cluster
  hosts: jump_servers
  gather_facts: false
  tasks:
    - name: Wait for nodes to register
      ansible.builtin.pause:
        seconds: 15

    - name: Get cluster nodes
      ansible.builtin.command:
        cmd: kubectl get nodes -o wide
      register: node_list
      retries: 5
      delay: 10
      until: node_list.rc == 0

    - name: Display cluster nodes
      ansible.builtin.debug:
        var: node_list.stdout_lines

    - name: Get component status
      ansible.builtin.command:
        cmd: kubectl get componentstatuses
      register: component_status
      ignore_errors: true

    - name: Display component status
      ansible.builtin.debug:
        var: component_status.stdout_lines
      when: component_status.stdout_lines is defined

    - name: Get cluster info
      ansible.builtin.command:
        cmd: kubectl cluster-info
      register: cluster_info
      ignore_errors: true

    - name: Display cluster info
      ansible.builtin.debug:
        var: cluster_info.stdout_lines
      when: cluster_info.stdout_lines is defined
