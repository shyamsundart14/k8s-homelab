---
# =============================================================================
# Vault Full Setup Playbook
# =============================================================================
# Complete Vault setup: bootstrap + PKI hierarchy
#
# Usage:
#   ansible-playbook playbooks/vault-full-setup.yml
#
# This playbook:
#   1. Waits for vault server to be ready
#   2. Bootstraps Vault (install, init, unseal)
#   3. Sets up PKI hierarchy for Kubernetes
#
# After running:
#   - Vault running at http://vault:8200
#   - PKI hierarchy: Root CA → Intermediate CA → kubernetes/etcd/front-proxy CAs
#   - PKI roles configured for certificate issuance
# =============================================================================

# -----------------------------------------------------------------------------
# Step 1: Wait for Vault Server to be Ready
# -----------------------------------------------------------------------------
- name: Wait for vault server to be ready
  hosts: vault_servers
  gather_facts: false
  tasks:
    - name: Wait for SSH connection
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 5

    - name: Vault server reachable
      ansible.builtin.debug:
        msg: "Vault server is ready for Ansible connections"

# -----------------------------------------------------------------------------
# Step 2: Bootstrap Vault
# -----------------------------------------------------------------------------
- name: Bootstrap HashiCorp Vault
  hosts: vault_servers
  gather_facts: true

  roles:
    - role: ../roles/vault-bootstrap

  post_tasks:
    - name: Vault bootstrap complete
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════════
          Vault Bootstrap Complete!
          ════════════════════════════════════════════════════════════
          Vault Address: http://{{ inventory_hostname }}:8200

# -----------------------------------------------------------------------------
# Step 3: Setup PKI Hierarchy
# -----------------------------------------------------------------------------
- name: Setup Vault PKI for Kubernetes
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Read Vault token from credentials file
      ansible.builtin.set_fact:
        vault_token: "{{ lookup('file', playbook_dir + '/../.vault-credentials/vault-init.json') | from_json | json_query('root_token') }}"

  roles:
    - role: ../roles/vault-pki

  post_tasks:
    - name: Full setup complete
      ansible.builtin.debug:
        msg: |
          
          ════════════════════════════════════════════════════════════
          Vault Full Setup Complete!
          ════════════════════════════════════════════════════════════
          
          Vault:
            Address: http://vault:8200
            UI:      http://192.168.64.11:8200
          
          PKI Hierarchy Created:
            ├── Root CA (pki_root)
            │   └── Intermediate CA (pki_int)
            │       ├── Kubernetes CA (pki_kubernetes)
            │       ├── etcd CA (pki_etcd)
            │       └── Front Proxy CA (pki_front_proxy)
          
          PKI Roles Ready:
            - Kubernetes: kube-apiserver, controller-manager, scheduler, etc.
            - etcd: server, peer, client, healthcheck
            - Front Proxy: front-proxy-client
          
          Credentials: ansible/.vault-credentials/
          
          Next Steps:
            1. Issue certificates using vault-issue-certs.yml or k8s-certs.yml
            2. Deploy K8s components with generated certificates
          
          ════════════════════════════════════════════════════════════
